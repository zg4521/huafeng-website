<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程感悟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  /* ===== Animated background layers ===== */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: -1;
  }
  .bg-base {
    background:
      radial-gradient(ellipse 70% 50% at 50% 30%, rgba(25,40,80,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 25% 70%, rgba(50,15,60,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 75% 70%, rgba(15,45,70,0.25) 0%, transparent 55%),
      linear-gradient(180deg, #070a18 0%, #0c0a14 45%, #060810 100%);
  }
  /* Subtle pulsing glow */
  .bg-glow {
    background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(60,100,180,0.05) 0%, transparent 70%);
    animation: glowPulse 8s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 0.8; transform: scale(1.15); }
  }

  /* ===== Title ===== */
  .page-title {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center;
    padding: clamp(16px, 2.5vh, 22px) 20px clamp(8px, 1.5vh, 14px);
    z-index: 10; pointer-events: none;
  }
  .page-title h1 {
    font-size: clamp(1.1rem, 2.4vw, 1.6rem); font-weight: 600;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.85);
  }

  /* ===== Back button ===== */
  .back-btn {
    position: fixed; top: clamp(12px, 1.8vh, 18px); left: clamp(10px, 2vw, 18px);
    z-index: 20;
    padding: clamp(5px, 1vh, 8px) clamp(12px, 2vw, 18px); border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.45); color: #fff;
    text-decoration: none; font-size: clamp(0.65rem, 1.1vw, 0.8rem);
    letter-spacing: 0.04em; transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }

  /* ===== Gallery Container ===== */
  #gallery {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  /* Dot grid */
  .dot-grid {
    position: absolute; inset: 0;
    opacity: 0.06; pointer-events: none;
    background-image: radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ===== Photo tiles ===== */
  .photo-tile {
    position: absolute;
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
    border-radius: 6px;
    background: #0a0a0a;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
  }
  .photo-tile img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>

<div class="bg-layer bg-base"></div>
<div class="bg-layer bg-glow"></div>

<div id="gallery">
  <div class="dot-grid"></div>
</div>

<div class="page-title"><h1>课程感悟</h1></div>
<a href="mountain-journey.html" class="back-btn">← 返回</a>

<script>
(function() {

  // ===== Photo pool (21 random-order photos) =====
  const photoPool = [
    "4F8B0611.JPG", "4F8B0612.JPG", "4F8B0644.JPG", "4F8B0869.JPG",
    "4F8B1460.JPG", "4F8B1706.JPG", "4F8B1724.JPG", "4F8B1738.JPG",
    "593A0202.JPG",
    "DSC00675.JPG", "DSC00779.JPG", "DSC00887.JPG",
    "DSC00928.JPG", "DSC01054.JPG", "DSC01117.JPG", "DSC01121.JPG",
    "DSC01249.JPG", "DSC01255.JPG", "DSC01301.JPG",
    "大合影.JPG", "宣誓2.JPG",
  ].map(f => 'node4-photos/' + f);

  // Fixed last photo — always the final one, centered
  const LAST_PHOTO = 'node4-photos/DSC00730.JPG';

  const TOTAL = photoPool.length + 1; // 21 + 1 = 22

  // Preload
  photoPool.forEach(src => { const i = new Image(); i.src = src; });
  { const i = new Image(); i.src = LAST_PHOTO; }

  // ===== DOM =====
  const gallery = document.getElementById('gallery');

  // ===== Shuffle =====
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ===== Compute responsive photo size (≈1/4 page) =====
  function getPhotoSize() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    // Base on smaller viewport dimension, roughly 38vmin = ~1/4 page
    const base = Math.min(W, H);
    const w = Math.round(Math.max(260, Math.min(700, base * 0.62)));
    const h = Math.round(w * 0.75); // 4:3 aspect ratio
    return { w, h };
  }

  // ===== Generate center-stack positions =====
  function generatePositions() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const size = getPhotoSize();
    const positions = [];

    for (let i = 0; i < TOTAL; i++) {
      const isLast = (i === TOTAL - 1);

      if (isLast) {
        // Last photo: dead center, no rotation
        const x = W / 2 - size.w / 2;
        const y = H / 2 - size.h / 2;
        positions.push({ x, y, w: size.w, h: size.h, rotation: 0 });
      } else {
        // Center area with random offset
        const spreadX = W * 0.32;
        const spreadY = H * 0.36;
        const cx = W / 2;
        const cy = H / 2;

        const goldenAngle = Math.PI * (3 - Math.sqrt(5));
        const radius = Math.sqrt(i / TOTAL) * Math.min(spreadX, spreadY) * 0.8;
        const angle = i * goldenAngle + (Math.random() - 0.5) * 0.6;

        const x = cx + Math.cos(angle) * radius + (Math.random() - 0.5) * spreadX * 0.5;
        const y = cy + Math.sin(angle) * radius + (Math.random() - 0.5) * spreadY * 0.4;

        const rotation = (Math.random() - 0.5) * 36;

        positions.push({ x: x - size.w / 2, y: y - size.h / 2, w: size.w, h: size.h, rotation });
      }
    }
    return positions;
  }

  let positions = generatePositions();
  let photoSize = getPhotoSize();

  window.addEventListener('resize', () => {
    positions = generatePositions();
    photoSize = getPhotoSize();
  });

  // ===== Run one full cycle =====
  function runCycle() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const sz = photoSize;
    const posList = positions;
    // Shuffle the 21, then append the fixed last photo
    const shuffled = shuffle(photoPool).concat(LAST_PHOTO);
    const tiles = [];
    let spawned = 0;

    // Timing
    const SPAWN_GAP = 700;      // slower spawn pace
    const FLY_DUR = 2.6;        // slow fly-in (seconds)
    const HOLD_ALL = 5000;
    const EXIT_DUR = 900;

    function placeOne() {
      if (spawned >= TOTAL) {
        setTimeout(clearAll, HOLD_ALL);
        return;
      }

      const idx = spawned;
      const pos = posList[idx];
      const src = shuffled[idx];
      spawned++;

      // Random fly-in direction (any angle 0–360°)
      const flyAngle = Math.random() * Math.PI * 2;
      const dist = Math.sqrt(W * W + H * H) * 0.75; // from far outside
      const cx = pos.x + pos.w / 2;
      const cy = pos.y + pos.h / 2;
      const startX = cx + Math.cos(flyAngle) * dist;
      const startY = cy + Math.sin(flyAngle) * dist;

      // Create tile
      const el = document.createElement('div');
      el.className = 'photo-tile';
      el.style.cssText = `
        left: ${pos.x}px; top: ${pos.y}px;
        width: ${sz.w}px; height: ${sz.h}px;
        opacity: 0;
        z-index: ${idx === TOTAL - 1 ? TOTAL + 10 : idx};
      `;

      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      el.appendChild(img);
      gallery.appendChild(el);

      // Animate in
      requestAnimationFrame(() => {
        const dx = startX - cx;
        const dy = startY - cy;
        el.style.transition = 'none';
        el.style.transform = `translate(${dx}px, ${dy}px) rotate(${pos.rotation * 2}deg) scale(0.15)`;
        el.style.opacity = '0.7';

        requestAnimationFrame(() => {
          el.style.transition = `transform ${FLY_DUR}s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s ease`;
          el.style.transform = `translate(0, 0) rotate(${pos.rotation}deg) scale(1)`;
          el.style.opacity = '1';
        });
      });

      tiles.push(el);

      // Schedule next
      setTimeout(placeOne, SPAWN_GAP);
    }

    function clearAll() {
      tiles.forEach(el => {
        el.style.transition = 'transform 0.9s ease-in, opacity 0.7s ease-in';
        el.style.transform = 'scale(0.1)';
        el.style.opacity = '0';
      });

      setTimeout(() => {
        tiles.forEach(el => el.remove());
        setTimeout(runCycle, 600);
      }, EXIT_DUR);
    }

    placeOne();
  }

  // ===== Start =====
  runCycle();

  // ===== Visibility =====
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      gallery.querySelectorAll('.photo-tile').forEach(el => el.remove());
    }
  });

})();
</script>
</body>
</html>
