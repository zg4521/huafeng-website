<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华峰的地标</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    background: #06060e;
  }

  /* ===== Animated background layers ===== */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: -1;
  }
  .bg-base {
    background:
      radial-gradient(ellipse 90% 50% at 50% 0%, rgba(40,60,120,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(80,30,60,0.2) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(20,60,100,0.2) 0%, transparent 50%),
      linear-gradient(180deg, #0a0f1d 0%, #0e0c16 50%, #060810 100%);
  }
  /* Slow drift light */
  .bg-drift {
    background: radial-gradient(ellipse 50% 50% at 40% 40%, rgba(100,140,200,0.06) 0%, transparent 70%);
    animation: driftGlow 10s ease-in-out infinite;
  }
  @keyframes driftGlow {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(2%, -1%) scale(1.2); }
    66%      { transform: translate(-1%, 1%) scale(0.9); }
  }
  /* Subtle star dots */
  .bg-stars {
    background-image:
      radial-gradient(1px 1px at 10% 12%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 30% 8%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 50% 15%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 90% 18%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 35% 90%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 75% 88%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 92% 82%, rgba(255,255,255,0.35), transparent);
  }

  /* ===== Title ===== */
  .page-title {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center; padding: 20px 20px 12px;
    z-index: 10; pointer-events: none;
  }
  .page-title h1 {
    font-size: clamp(1.1rem, 2.4vw, 1.6rem); font-weight: 600;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.85);
  }

  /* ===== Back button ===== */
  .back-btn {
    position: fixed; top: clamp(12px, 1.8vh, 18px); left: clamp(10px, 2vw, 18px); z-index: 20;
    padding: clamp(5px, 1vh, 8px) clamp(12px, 2vw, 18px); border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.45); color: #fff;
    text-decoration: none; font-size: clamp(0.65rem, 1.1vw, 0.8rem);
    letter-spacing: 0.04em; transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }

  /* ===== Main Layout: Cube top, Text below ===== */
  .main-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(16px, 3vh, 32px);
    margin: clamp(60px, 10vh, 80px) clamp(10px, 3vw, 20px) 0;
    max-width: clamp(600px, 90vw, 1100px);
    width: 100%;
  }

  /* ===== Cube ===== */
  .cube-scene {
    position: relative;
    width: clamp(280px, 40vw, 500px);
    height: clamp(180px, 26vw, 320px);
    flex-shrink: 0;
    perspective: 1000px;
    perspective-origin: 50% 50%;
    margin-bottom: clamp(24px, 4vh, 48px);
  }

  .cube {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.44, 0, 0.56, 1);
  }

  .cube-face {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    overflow: hidden;
    background: #111;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    border-radius: 4px;
  }
  .cube-face img {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
    pointer-events: none; user-select: none;
  }

  /* Face transforms set by JS for responsive translateZ */

  /* ===== Text Panel (below cube) ===== */
  .text-panel {
    width: 100%;
    max-width: clamp(280px, 50vw, 560px);
    padding: clamp(14px, 2.5vh, 24px) clamp(12px, 2.5vw, 22px);
    min-height: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    z-index: 5;
    background: rgba(6,6,14,0.6);
    border-radius: 8px;
  }
  .panel-content {
    width: 100%;
  }
  .panel-title {
    font-size: clamp(0.82rem, 1.4vw, 1.15rem);
    color: rgba(255,255,255,0.85);
    line-height: 1.7;
    letter-spacing: 0.04em;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .panel-title.fading {
    opacity: 0;
    transform: translateX(8px);
  }
  .panel-index {
    margin-top: clamp(8px, 2vh, 16px);
    font-size: clamp(0.65rem, 1vw, 0.85rem);
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.1em;
  }

  /* ===== Dots ===== */
  .cube-dots {
    display: flex; gap: clamp(6px, 1.2vw, 12px);
    margin: clamp(10px, 3vh, 24px) 0 clamp(4px, 1vh, 8px);
  }
  .cube-dot {
    width: clamp(6px, 0.9vw, 10px); height: clamp(6px, 0.9vw, 10px);
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    cursor: pointer; border: none; padding: 0;
    transition: all 0.3s;
  }
  .cube-dot.active {
    background: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }


  /* ===== Mobile ===== */
  @media (max-width: 780px) {
    .main-row {
      gap: clamp(8px, 2vh, 16px);
    }
    .cube-scene { width: clamp(240px, 65vw, 360px); height: clamp(150px, 42vw, 240px); }
    .text-panel { max-width: clamp(260px, 80vw, 400px); padding: 12px 16px; }
    .panel-title { font-size: clamp(0.75rem, 2vw, 0.95rem); }
  }
</style>
</head>
<body>

<div class="bg-layer bg-base"></div>
<div class="bg-layer bg-drift"></div>
<div class="bg-layer bg-stars"></div>

<div class="page-title"><h1>华峰的地标</h1></div>
<a href="mountain-journey.html" class="back-btn">← 返回</a>

<!-- Main row: cube + text panel -->
<div class="main-row">

  <!-- 3D Cube -->
  <div class="cube-scene" id="cubeScene">
    <div class="cube" id="cube">
      <div class="cube-face"><img src="" alt="" id="img0" /></div>
      <div class="cube-face"><img src="" alt="" id="img1" /></div>
      <div class="cube-face"><img src="" alt="" id="img2" /></div>
      <div class="cube-face"><img src="" alt="" id="img3" /></div>
      <div class="cube-face"><img src="" alt="" id="img4" /></div>
    </div>
  </div>

  <!-- Text Panel -->
  <div class="text-panel">
    <div class="panel-content">
      <div class="panel-title" id="titleText"></div>
      <div class="panel-index" id="panelIndex"></div>
    </div>
  </div>

</div>

<!-- Dots -->
<div class="cube-dots" id="cubeDots"></div>


<script>
(function() {
  const landmarks = [
    {
      image: "从实验室的理论研究，到研究院的产业实践，新征程自此启程，踏实做事，慢慢成长。.jpg",
      title: "从实验室的理论研究，到研究院的产业实践，新征程自此启程，踏实做事，慢慢成长。",
    },
    {
      image: "见证企业科创积淀，我辈青年当紧跟步伐奋勇争先。.jpg",
      title: "见证企业科创积淀，我辈青年当紧跟步伐奋勇争先。",
    },
    {
      image: "现代化产业空间，聚力产业集聚与创新发展.jpg",
      title: "现代化产业空间，聚力产业集聚与创新发展",
    },
    {
      image: "枝头花开烂漫，身后是日常深耕的生产车间。草木生长代表蓬勃生机，成套装置承载产业梦想，于烟火厂区间守好工艺一线，以青春匠心助力绿色新材料发展.jpg",
      title: "枝头花开烂漫，身后是日常深耕的生产车间。草木生长代表蓬勃生机，成套装置承载产业梦想，于烟火厂区间守好工艺一线，以青春匠心助力绿色新材料发展",
    },
    {
      image: "滴！集团文化地标打卡成功～站在名牌前，身后是家，前方是路.jpg",
      title: "滴！集团文化地标打卡成功～站在名牌前，身后是家，前方是路",
    },
  ];

  const n = landmarks.length;
  const cube = document.getElementById('cube');
  const titleText = document.getElementById('titleText');
  const panelIndex = document.getElementById('panelIndex');
  const dotsContainer = document.getElementById('cubeDots');
  const scene = document.getElementById('cubeScene');

  // Responsive translateZ: enough radius so 5 faces don't overlap
  function updateFaceTransforms() {
    const w = scene.offsetWidth;
    const tz = Math.round(w / (2 * Math.tan(Math.PI / 5))); // ~w * 0.688
    const faces = document.querySelectorAll('.cube-face');
    faces[0].style.transform = 'rotateY(0deg)   translateZ(' + tz + 'px)';
    faces[1].style.transform = 'rotateY(72deg)  translateZ(' + tz + 'px)';
    faces[2].style.transform = 'rotateY(144deg) translateZ(' + tz + 'px)';
    faces[3].style.transform = 'rotateY(216deg) translateZ(' + tz + 'px)';
    faces[4].style.transform = 'rotateY(288deg) translateZ(' + tz + 'px)';
  }
  updateFaceTransforms();
  window.addEventListener('resize', updateFaceTransforms);

  landmarks.forEach((lm, i) => {
    document.getElementById('img' + i).src = lm.image;
    const dot = document.createElement('button');
    dot.className = 'cube-dot';
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  let active = 0;
  let locked = false;
  const MOVE_DUR = 1000;

  function updateCube() {
    cube.style.transform = 'rotateY(' + (-active * 72) + 'deg)';
    titleText.classList.add('fading');
    setTimeout(() => {
      titleText.textContent = landmarks[active].title;
      panelIndex.textContent = (active + 1) + ' / ' + n;
      titleText.classList.remove('fading');
    }, 260);
    const dots = dotsContainer.querySelectorAll('.cube-dot');
    dots.forEach((d, i) => d.classList.toggle('active', i === active));
  }

  function lock() { locked = true; setTimeout(() => { locked = false; }, MOVE_DUR + 150); }

  function step(dir) {
    if (locked) return;
    lock();
    active = (((active + dir) % n) + n) % n;
    updateCube();
  }

  function goTo(i) {
    if (locked || i === active) return;
    lock();
    active = i;
    updateCube();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); step(-1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); step(1); }
  });

  const sceneEl = document.getElementById('cubeScene');
  let touchX = 0;
  sceneEl.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; });
  sceneEl.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) step(dx > 0 ? -1 : 1);
  });

  // Autoplay
  let timer = null;
  function start() { stop(); timer = setInterval(() => step(1), 4000); }
  function stop()  { if (timer) { clearInterval(timer); timer = null; } }

  titleText.textContent = landmarks[0].title;
  panelIndex.textContent = '1 / ' + n;
  updateCube();
  start();
})();
</script>
</body>
</html>
