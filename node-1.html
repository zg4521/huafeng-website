<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>探峰成员</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background: #06080f;
  }

  /* ===== Animated background layers ===== */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: -1;
  }
  .bg-base {
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(30,50,100,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 70% 70%, rgba(60,20,80,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 100%, rgba(20,40,80,0.3) 0%, transparent 50%),
      linear-gradient(180deg, #0a0f1f 0%, #0c0c18 40%, #060810 100%);
  }
  /* Aurora band */
  .bg-aurora {
    background: radial-gradient(ellipse 120% 30% at 25% 35%, rgba(80,140,220,0.08) 0%, transparent 50%);
    animation: auroraShift 12s ease-in-out infinite;
  }
  @keyframes auroraShift {
    0%, 100% { opacity: 0.5; transform: translateX(0) scaleY(1); }
    25%      { opacity: 0.8; transform: translateX(3%) scaleY(1.3); }
    50%      { opacity: 0.4; transform: translateX(0) scaleY(0.8); }
    75%      { opacity: 0.7; transform: translateX(-2%) scaleY(1.2); }
  }
  /* Subtle particles layer */
  .bg-particles {
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 40% 15%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 68% 28%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 80% 60%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 72% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 48% 70%, rgba(255,255,255,0.3), transparent);
    animation: twinkle 8s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* ===== Page Header ===== */
  .page-title {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center; padding: 20px 20px 12px;
    z-index: 10; pointer-events: none;
  }
  .page-title h1 {
    font-size: clamp(1.1rem, 2.4vw, 1.6rem); font-weight: 600;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.85);
  }

  /* ===== Back button ===== */
  .back-btn {
    position: fixed; top: clamp(12px, 1.8vh, 18px); left: clamp(10px, 2vw, 18px); z-index: 20;
    padding: clamp(5px, 1vh, 8px) clamp(12px, 2vw, 18px); border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.45); color: #fff;
    text-decoration: none; font-size: clamp(0.65rem, 1.1vw, 0.8rem);
    letter-spacing: 0.04em; transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }

  /* ===== Coverflow Container ===== */
  .coverflow-wrap {
    position: relative;
    width: 100%;
    max-width: clamp(400px, 90vw, 1100px);
    height: clamp(320px, 62vmin, 700px);
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1600px;
    overflow: hidden;
    outline: none;
    margin: clamp(10px, 2vmin, 20px) auto;
  }

  .coverflow-stage {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    transform-style: preserve-3d;
  }

  /* ===== Cards ===== */
  .cf-card {
    position: absolute;
    left: 50%;
    top: 50%;
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--radius);
    overflow: hidden;
    transform-style: preserve-3d;
    transform-origin: center center;
    transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    background: #1a1a1a;
    cursor: pointer;
    user-select: none;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    will-change: transform, opacity;
  }
  .cf-card img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    image-rendering: auto;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: translateZ(0);
  }

  /* Dim overlay */
  .cf-dim {
    position: absolute;
    inset: 0;
    background: #000;
    transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }

  /* Title gradient + text */
  .cf-title-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }
  .cf-title {
    position: absolute;
    left: clamp(12px, 3vw, 22px);
    right: clamp(12px, 3vw, 22px);
    bottom: clamp(12px, 3vw, 24px);
    color: #fff;
    font-size: clamp(14px, 2.4vmin, 28px);
    font-weight: 700;
    line-height: 1.1em;
    letter-spacing: -0.02em;
    white-space: pre-line;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    pointer-events: none;
  }

  /* ===== Nav Arrows ===== */
  .nav-arrows {
    display: flex;
    gap: clamp(12px, 3vw, 28px);
    margin-bottom: clamp(14px, 4vh, 34px);
  }
  .nav-arrow {
    width: clamp(32px, 5vw, 48px); height: clamp(32px, 5vw, 48px);
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: clamp(0.9rem, 1.6vw, 1.3rem);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .nav-arrow:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.4);
  }

  /* ===== Dots ===== */
  .nav-dots {
    display: flex;
    gap: clamp(4px, 1vw, 10px);
    margin-bottom: clamp(10px, 3vh, 24px);
  }
  .nav-dot {
    width: clamp(6px, 0.9vw, 10px); height: clamp(6px, 0.9vw, 10px);
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s;
    border: none;
    padding: 0;
  }
  .nav-dot.active {
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  /* ===== Coverflow wrapper pushes down for fixed header ===== */
  .coverflow-wrap { margin-top: clamp(40px, 8vh, 70px); }

  @media (max-width: 768px) {
    .coverflow-wrap { height: clamp(280px, 85vh, 500px); }
    .cf-title { font-size: clamp(14px, 3vw, 20px); left: clamp(10px, 3vw, 16px); right: clamp(10px, 3vw, 16px); bottom: clamp(8px, 2vh, 16px); }
  }
</style>
</head>
<body>

<div class="bg-layer bg-base"></div>
<div class="bg-layer bg-aurora"></div>
<div class="bg-layer bg-particles"></div>

<div class="page-title"><h1>探峰成员</h1></div>
<a href="mountain-journey.html" class="back-btn">← 返回</a>

<!-- ===== Coverflow ===== -->
<div class="coverflow-wrap" id="coverflow" tabindex="0">
  <div class="coverflow-stage" id="stage">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- Nav arrows -->
<div class="nav-arrows">
  <button class="nav-arrow" id="prevBtn" aria-label="上一个">◂</button>
  <button class="nav-arrow" id="nextBtn" aria-label="下一个">▸</button>
</div>

<!-- Dots -->
<div class="nav-dots" id="navDots"></div>

<!-- Back -->

<script>
(function() {
  // ===== 探峰成员数据 =====
  const members = [
    {
      image: "TPU公司-张德楠.jpg",
      title: "TPU公司\n张德楠",
    },
    {
      image: "TPU公司-章家禄.jpg",
      title: "TPU公司\n章家禄",
    },
    {
      image: "上海研究院-张献涛_hd.jpg",
      title: "上海研究院\n张献涛",
    },
    {
      image: "化学公司-周舸_hd.jpg",
      title: "化学公司\n周舸",
    },
    {
      image: "华港公司-张星宇.jpg",
      title: "华港公司\n张星宇",
    },
    {
      image: "合成树脂公司-金方圆_hd.jpg",
      title: "合成树脂公司\n金方圆",
    },
    {
      image: "新材料公司-杜嘉烨.jpg",
      title: "新材料公司\n杜嘉烨",
    },
    {
      image: "新材料公司-郑乐天_hd.jpg",
      title: "新材料公司\n郑乐天",
    },
    {
      image: "环保材料公司-赵浩淼.jpg",
      title: "环保材料公司\n赵浩淼",
    },
    {
      image: "聚酰胺公司-何龙.jpg",
      title: "聚酰胺公司\n何龙",
    },
    {
      image: "集团公司-洪权.jpg",
      title: "集团公司\n洪权",
    },
  ];

  // ===== Config (responsive — scales with viewport) =====
  const OPACITY = 60;
  const SCALE_STEP = 0.16;
  const MAX_VISIBLE = 2;
  const TILT = 12;
  const SIDE_TILT = 8;
  const CARD_RADIUS = 3;

  const n = members.length;
  let active = 0;
  let locked = false;
  const MOVE_DUR = 600;

  const stage = document.getElementById('stage');
  const coverflow = document.getElementById('coverflow');

  // Compute card size from viewport
  function getCardSize() {
    const vmin = Math.min(window.innerWidth, window.innerHeight);
    return Math.round(Math.max(160, Math.min(560, vmin * 0.48)));
  }
  function getGap()    { const vmin = Math.min(window.innerWidth, window.innerHeight); return Math.round(Math.max(4, Math.min(8, vmin * 0.007))); }
  function getDepth()  { const vmin = Math.min(window.innerWidth, window.innerHeight); return Math.round(Math.max(80, Math.min(240, vmin * 0.21))); }

  let CARD_W = getCardSize();
  let CARD_H = CARD_W;
  let GAP = getGap();
  let DEPTH = getDepth();

  function updateCardVars() {
    CARD_W = getCardSize(); CARD_H = CARD_W;
    GAP = getGap(); DEPTH = getDepth();
    stage.style.setProperty('--card-w', CARD_W + 'px');
    stage.style.setProperty('--card-h', CARD_H + 'px');
    const effRadius = (Math.max(0, Math.min(20, CARD_RADIUS)) / 20) * (Math.min(CARD_W, CARD_H) / 2);
    stage.style.setProperty('--radius', effRadius + 'px');
  }
  updateCardVars();

  window.addEventListener('resize', () => { updateCardVars(); positionCards(); });

  const dim = 1 - Math.max(0, Math.min(100, OPACITY)) / 100;

  // ===== Build cards =====
  const cards = [];
  const dotsContainer = document.getElementById('navDots');

  members.forEach((m, i) => {
    // Card
    const card = document.createElement('div');
    card.className = 'cf-card';
    card.innerHTML = `
      <img src="${m.image}" alt="${m.title}" draggable="false" />
      <div class="cf-title-bg"></div>
      <div class="cf-title">${m.title}</div>
      <div class="cf-dim"></div>
    `;
    card.addEventListener('click', () => handleClick(i));
    stage.appendChild(card);
    cards.push(card);

    // Dot
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  // ===== Position cards =====
  function positionCards() {
    cards.forEach((card, i) => {
      let rel = i - active;
      // Loop
      if (rel > n / 2) rel -= n;
      if (rel < -n / 2) rel += n;

      const ax = Math.abs(rel);
      const visible = ax <= MAX_VISIBLE;
      const isActive = rel === 0;
      const sc = Math.max(0.4, 1 - ax * SCALE_STEP);
      const tx = rel * (GAP * 30);
      const tz = -ax * DEPTH;
      const ry = -rel * TILT;
      const rz = rel * SIDE_TILT;

      card.style.transform = `translate(-50%, -50%) translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) rotateZ(${rz}deg) scale(${sc})`;
      card.style.opacity = visible ? 1 : 0;
      card.style.pointerEvents = visible ? 'auto' : 'none';
      card.style.cursor = isActive ? 'default' : 'pointer';

      // Dim overlay
      const dimEl = card.querySelector('.cf-dim');
      if (dimEl) dimEl.style.opacity = isActive ? 0 : dim;
    });

    // Update dots
    const dots = dotsContainer.querySelectorAll('.nav-dot');
    dots.forEach((d, i) => d.classList.toggle('active', i === active));
  }

  // ===== Navigation =====
  function lock() {
    locked = true;
    setTimeout(() => { locked = false; }, MOVE_DUR);
  }

  function step(dir) {
    if (locked) return;
    lock();
    active = (((active + dir) % n) + n) % n;
    positionCards();
  }

  function goTo(i) {
    if (locked || i === active) return;
    lock();
    active = i;
    positionCards();
  }

  function handleClick(i) {
    if (locked) return;
    if (i === active) {
      step(1);
    } else {
      goTo(i);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', () => step(-1));
  document.getElementById('nextBtn').addEventListener('click', () => step(1));

  // Keyboard
  coverflow.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') { e.preventDefault(); step(1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); step(-1); }
  });

  // ===== Autoplay =====
  const AUTOPLAY_DELAY = 5000; // ms between slides
  let autoplayTimer = null;

  function startAutoplay() {
    stopAutoplay();
    autoplayTimer = setInterval(() => step(1), AUTOPLAY_DELAY);
  }

  function stopAutoplay() {
    if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
  }

  // Init
  positionCards();
  startAutoplay();

  console.log('%c🖼️ 探峰成员 %cCoverflow %c就绪',
    'font-size:1.2em;', '', 'color:#aaa;');
})();
</script>
</body>
</html>
